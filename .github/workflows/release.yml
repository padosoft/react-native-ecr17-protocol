name: Release packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package/*/CHANGELOG.md"
      - ".changeset/*"

concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
    NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    if: github.repository == 'padosoft/react-native-ecr17-protocol'
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/ci-setup
        env:
          GESCAT_NPM_TOKEN: ${{ secrets.GESCAT_NPM_TOKEN }}
          
      - name: Create Release Pull Request or Publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun version-packages
          publish: bun publish-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changeset publish (above) targets npmjs.org via publishConfig.registry.
      # Mirror the same version to GitHub Packages so the app can install from there too.
      # Runs with always() and decides from the registries directly, because the
      # changesets step often succeeds the npm publish but then fails creating the
      # GitHub Release (transient HttpError) — we must not let that skip the mirror.
      # Auth via GESCAT_NPM_TOKEN (a PAT authorized for the @padosoft org) — the same
      # token gescat-openapi-spec uses. The default GITHUB_TOKEN is not allowed to
      # create packages in this org, so it fails with ENEEDAUTH / create_package 403.
      - name: Publish to GitHub Packages
        if: always()
        working-directory: package
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          # Only mirror a version that actually made it to npmjs (i.e. a real publish run).
          # Done before writing the scoped .npmrc so the scope->GitHub mapping can't
          # redirect this npmjs lookup.
          if ! npm view "$NAME@$VERSION" --registry=https://registry.npmjs.org version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is not on npmjs yet — nothing to mirror."
            exit 0
          fi
          # IMPORTANT: this is an npm workspace; npm ignores .npmrc inside workspace
          # members (package/). The auth/registry config must live at the repo root.
          NPMRC="$GITHUB_WORKSPACE/.npmrc"
          {
            echo "@padosoft:registry=https://npm.pkg.github.com/"
            echo "//npm.pkg.github.com/:_authToken=${GESCAT_NPM_TOKEN}"
          } > "$NPMRC"
          trap 'rm -f "$NPMRC"' EXIT
          if npm view "$NAME@$VERSION" --registry=https://npm.pkg.github.com version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already on GitHub Packages — nothing to do."
            exit 0
          fi
          # Build output is produced by the publish path (codegen); rebuild if absent.
          [ -d lib ] || bun run codegen
          npm publish --registry=https://npm.pkg.github.com
        env:
          GESCAT_NPM_TOKEN: ${{ secrets.GESCAT_NPM_TOKEN }}
          # Provenance/sigstore is npmjs-only; it breaks publishing to GitHub Packages.
          NPM_CONFIG_PROVENANCE: false

      - name: Publish release tags
        run: git push --follow-tags --set-upstream origin HEAD