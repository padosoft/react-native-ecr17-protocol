name: Release packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package/*/CHANGELOG.md"
      - ".changeset/*"

concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
    NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    if: github.repository == 'padosoft/react-native-ecr17-protocol'
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/ci-setup
        env:
          GESCAT_NPM_TOKEN: ${{ secrets.GESCAT_NPM_TOKEN }}
          
      - name: Create Release Pull Request or Publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun version-packages
          publish: bun publish-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changeset publish (above) targets npmjs.org via publishConfig.registry.
      # Mirror the same build to GitHub Packages so the app can install from there too.
      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        working-directory: package
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --registry=https://npm.pkg.github.com
          rm -f .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provenance/sigstore is npmjs-only; it breaks publishing to GitHub Packages.
          NPM_CONFIG_PROVENANCE: false

      - name: Publish release tags
        run: git push --follow-tags --set-upstream origin HEAD