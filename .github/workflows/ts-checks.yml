name: TS & codegen

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ts-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  typecheck:
    name: Typecheck + Nitrogen codegen
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        # @padosoft/config lives on GitHub Packages (padosoft/ts-support).
        # bunfig.toml maps the `padosoft` scope to npm.pkg.github.com via
        # $GESCAT_NPM_TOKEN; GitHub Packages still wants a token even for public
        # packages, so fall back to the Actions GITHUB_TOKEN.
        env:
          GESCAT_NPM_TOKEN: ${{ secrets.GESCAT_NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: bun install

      - name: Nitrogen codegen
        run: ./node_modules/.bin/nitrogen

      - name: Typecheck (self-contained config)
        run: bunx tsc --noEmit -p tsconfig.ci.json
