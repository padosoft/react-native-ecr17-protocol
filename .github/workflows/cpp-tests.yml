name: C++ unit tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cpp-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-tests:
    if: github.repository == 'padosoft/react-native-ecr17-protocol'
    name: Build & run C++ tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: cmake -S package/cpp/tests -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
